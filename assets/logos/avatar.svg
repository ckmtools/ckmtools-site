<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5a0"/>
      <stop offset="50%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
  </defs>

  <!-- Background squircle -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Left angle bracket -->
  <path d="M 190 155 L 105 256 L 190 357"
        stroke="url(#accent)" stroke-width="38"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Right angle bracket -->
  <path d="M 322 155 L 407 256 L 322 357"
        stroke="url(#accent)" stroke-width="38"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Center diamond -->
  <path d="M 256 218 L 294 256 L 256 294 L 218 256 Z"
        fill="url(#accent)"/>
</svg>
